<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="One of the Sides">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>One of the Sides</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="installation" aria-label="One of the Sides camera installation">
      <video id="camera" autoplay muted playsinline></video>
      <canvas id="renderCanvas"></canvas>

      <section id="startPanel" class="start-panel" aria-label="One of the Sides start screen">
        <canvas id="landingCanvas" aria-hidden="true"></canvas>
        <div class="landing-content">
          <h1 id="landingTitle" aria-label="One of the Sides">
            <span aria-hidden="true" class="title-letter">O</span><span aria-hidden="true" class="title-letter">n</span><span aria-hidden="true" class="title-letter">e</span><span aria-hidden="true" class="title-space"> </span><span aria-hidden="true" class="title-letter">o</span><span aria-hidden="true" class="title-letter">f</span><span aria-hidden="true" class="title-space"> </span><span aria-hidden="true" class="title-letter">t</span><span aria-hidden="true" class="title-letter">h</span><span aria-hidden="true" class="title-letter">e</span><span aria-hidden="true" class="title-space"> </span><span aria-hidden="true" class="title-letter">S</span><span aria-hidden="true" class="title-letter">i</span><span aria-hidden="true" class="title-letter">d</span><span aria-hidden="true" class="title-letter">e</span><span aria-hidden="true" class="title-letter">s</span>
          </h1>
          <button id="startButton" class="primary-button" type="button">Start</button>
          <p id="startMessage" class="start-message">Camera access begins after the transition.</p>
        </div>
      </section>

      <div id="statePanel" class="state-panel" aria-live="polite">
        <span id="stageLabel">Waiting</span>
        <span id="bodyLabel">No body</span>
      </div>

      <button id="switchCameraButton" class="camera-button" type="button" hidden>
        Camera
      </button>
    </main>
  </body>
</html>
