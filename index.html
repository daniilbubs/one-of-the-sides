<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="One of the Sides">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>One of the Sides</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script defer src="app.js"></script>
    <script defer src="side2-fluid.js"></script>
    <script defer src="side3-light.js"></script>
  </head>
  <body>
    <main class="installation" aria-label="One of the Sides camera installation">
      <video id="camera" autoplay muted playsinline></video>
      <canvas id="renderCanvas"></canvas>

      <section id="startPanel" class="start-panel" aria-label="One of the Sides start screen">
        <canvas id="landingCanvas" aria-hidden="true"></canvas>
        <div class="landing-content">
          <h1 id="landingTitle" aria-label="One of the Sides">
            <span class="title-line" aria-hidden="true"><span class="title-letter">O</span><span class="title-letter">n</span><span class="title-letter">e</span><span class="title-space"> </span><span class="title-letter">o</span><span class="title-letter">f</span></span>
            <span class="title-line" aria-hidden="true"><span class="title-letter">t</span><span class="title-letter">h</span><span class="title-letter">e</span><span class="title-space"> </span><span class="title-letter">S</span><span class="title-letter">i</span><span class="title-letter">d</span><span class="title-letter">e</span><span class="title-letter">s</span></span>
          </h1>

          <div id="cameraChoice" class="camera-choice" role="group" aria-label="Camera direction">
            <button class="choice-button is-selected" type="button" data-camera-choice="environment">Rear Camera</button>
            <button class="choice-button" type="button" data-camera-choice="user">Front Camera</button>
          </div>

          <button id="startButton" class="primary-button" type="button">Start</button>
          <p id="startMessage" class="start-message">Waiting for presence...</p>
        </div>

        <div id="sideSelection" class="side-selection" aria-label="Select side" hidden>
          <button class="side-selection-button" type="button" data-side="1">1</button>
          <button class="side-selection-button" type="button" data-side="2">2</button>
          <button class="side-selection-button" type="button" data-side="3">3</button>
          <button class="side-selection-button" type="button" data-side="4">4</button>
        </div>
      </section>

      <div id="statePanel" class="state-panel" aria-live="polite">
        <span id="stageLabel">Waiting for presence...</span>
        <span id="bodyLabel" hidden></span>
      </div>

      <button id="switchCameraButton" class="camera-button" type="button" hidden aria-hidden="true">
        Camera
      </button>
    </main>
  </body>
</html>
